version: "3.9"
services:
  qdrant:
    image: qdrant/qdrant:v1.11.0
    ports: ["6333:6333"]
    volumes: ["./infra/qdrant_storage:/qdrant/storage"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  gateway:
    build: ./infra/docker/gateway
    env_file: .env
    ports: ["8000:8000"]
    depends_on: [market, rag, advisor, report]

  market:
    build: ./infra/docker/market
    env_file: .env
    ports: ["8001:8001"]
    depends_on: [redis]

  rag:
    build: ./infra/docker/rag
    env_file: .env
    ports: ["8002:8002"]
    depends_on: [qdrant]

  advisor:
    build: ./infra/docker/advisor
    env_file: .env
    ports: ["8003:8003"]

  report:
    build: ./infra/docker/report
    env_file: .env
    ports: ["8004:8004"]

  ui:
    build: ./infra/docker/ui
    env_file: .env
    ports: ["8501:8501"]
    depends_on: [gateway]
