version: "3.9"

services:
  
  ml-bridge:
    build:
      context: ..
      dockerfile: infra/docker/ml-bridge/Dockerfile
    container_name: ml-bridge
    environment:
      MLBRIDGE_CONFIG: /app/config/models.yaml
      SUBPROC_TIMEOUT: 15
    volumes:
      - ../apps/ml-bridge:/app
    ports:
      - "7000:7000"
  
  qdrant:
    image: qdrant/qdrant:v1.10.0
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"

  rag:
    build:
      context: ..
      dockerfile: infra/docker/rag-service/Dockerfile
    container_name: rag
    env_file:
      - ../.env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      QDRANT_COLLECTION: kfh_docs_gemini
      USER_AGENT: "kfh-rag/1.0"
    volumes:
      - ../apps/rag-service:/app
      - ../configs:/configs:ro
      - ../.env:/app/.env:ro
    depends_on:
      - qdrant
    ports:
      - "8002:8002"

  gateway:
    build:
      context: ..
      dockerfile: infra/docker/gateway/Dockerfile
    container_name: gateway
    environment:
      RAG_URL: http://rag:8002
      ADVISOR_URL: http://advisor:8003   # <── 新增
      REPORT_URL: http://report:8004     # <── 新增
    volumes:
      - ../apps/gateway:/app
    depends_on:
      - rag
      - advisor
      - report
    ports:
      - "8000:8000"

  advisor:
    build:
      context: ..
      dockerfile: infra/docker/advisor-service/Dockerfile
    container_name: advisor
    environment:
      MKT_URL: http://market:8005        # <── 新增
      ML_BRIDGE_URL: http://ml-bridge:7000
    volumes:
      - ../apps/advisor-service:/app
    depends_on:
      - market
      - ml-bridge
    ports:
      - "8003:8003"

  report:
    build:
      context: ..
      dockerfile: infra/docker/report-service/Dockerfile
    container_name: report
    volumes:
      - ../apps/report-service:/app
    ports:
      - "8004:8004"

  market:
    build:
      context: ..
      dockerfile: infra/docker/market-service/Dockerfile
    container_name: market
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MARKET_TTL_SEC: 90
    volumes:
      - ../apps/market-service:/app
    depends_on:
      - redis
    ports:
      - "8005:8005"

  ui:
    build:
      context: ..
      dockerfile: infra/docker/ui/Dockerfile
    container_name: ui
    environment:
      GATEWAY_URL: http://gateway:8000
      TRAIN_CSV_PATH: /app/data/train.csv
    volumes:
      - ../apps/ui:/app
      - ../apps/ui/data:/app/data:ro
    depends_on:
      - gateway
    ports:
      - "8501:8501"

  tests:
    build:
      context: ..
      dockerfile: infra/docker/rag-service/Dockerfile
    container_name: tests
    volumes:
      - ../apps:/app
      - ../tests:/tests
      - ../.env:/app/.env:ro
    working_dir: /tests
    command: ["pytest", "-v", "--maxfail=1", "--disable-warnings"]
    depends_on:
      - rag
      - gateway
      - advisor
      - report
      - market

volumes:
  qdrant_data:

